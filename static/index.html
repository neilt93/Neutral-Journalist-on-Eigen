<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Neutral Wire</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;background:#fafaf8;color:#1a1a1a}
  a{color:#1a1a1a;text-decoration:none}

  /* Masthead */
  .masthead{text-align:center;padding:1.5rem 2rem 1rem;border-bottom:3px double #222}
  .masthead h1{font-size:2.2rem;font-weight:400;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.15rem}
  .masthead .tagline{font-size:0.8rem;color:#888;font-family:-apple-system,sans-serif;letter-spacing:0.05em;font-style:italic}
  .masthead .date{font-size:0.75rem;color:#999;font-family:-apple-system,sans-serif;margin-top:0.4rem}

  /* Nav */
  .nav-bar{display:flex;justify-content:center;gap:2rem;padding:0.7rem 2rem;border-bottom:1px solid #ddd;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:0.82rem;position:sticky;top:0;background:#fafaf8;z-index:100}
  .nav-bar a{color:#666;cursor:pointer;padding:0.2rem 0;border-bottom:2px solid transparent;transition:all 0.15s}
  .nav-bar a.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
  .nav-bar a:hover{color:#1a1a1a}
  .nav-bar .controls{display:flex;align-items:center;gap:0.75rem;margin-left:auto}
  .status-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block}
  .run-btn{background:#1a1a1a;color:#fff;border:none;padding:0.3rem 0.9rem;border-radius:3px;cursor:pointer;font-size:0.75rem;font-family:inherit}
  .run-btn:hover{background:#333}

  /* Pipeline banner */
  .banner{display:none;background:#f0f7ff;border-bottom:1px solid #d0e0f0;padding:0.5rem 2rem;font-size:0.78rem;color:#4a6fa5;text-align:center;font-family:-apple-system,sans-serif}
  .banner.active{display:block}

  /* Pages */
  .page{display:none;max-width:780px;margin:0 auto;padding:2.5rem 1.5rem}
  .page.active{display:block}

  /* Feed */
  .feed-empty{text-align:center;padding:5rem 1rem;color:#999}
  .feed-empty p{margin-bottom:0.5rem}

  /* Article card */
  .card{margin-bottom:2.5rem;padding-bottom:2.5rem;border-bottom:1px solid #e0e0e0}
  .card:last-child{border-bottom:none}
  .card-image{width:100%;height:320px;object-fit:cover;border-radius:4px;margin-bottom:1.25rem;background:#e8e8e8}
  .card-image.placeholder{display:flex;align-items:center;justify-content:center;color:#bbb;font-family:-apple-system,sans-serif;font-size:0.9rem}
  .card h2{font-size:1.65rem;font-weight:400;line-height:1.35;margin-bottom:0.6rem}
  .card h2 a:hover{text-decoration:underline}
  .card-meta{font-size:0.78rem;color:#999;font-family:-apple-system,sans-serif;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:0.5rem;align-items:center}
  .card-meta .sep{color:#ddd}
  .card-body{font-size:1.05rem;line-height:1.85;color:#333;margin-bottom:1.25rem}
  .card-body p{margin-bottom:1rem}

  /* Verification badge */
  .verified-badge{display:inline-flex;align-items:center;gap:0.3rem;font-family:-apple-system,sans-serif;font-size:0.72rem;color:#22c55e;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:3px;padding:0.15rem 0.5rem}
  .failed-badge{color:#ef4444;background:#fef2f2;border-color:#fecaca}

  /* Score bar */
  .score-bar{display:flex;gap:1rem;margin:1rem 0;font-family:-apple-system,sans-serif;font-size:0.78rem;color:#888;flex-wrap:wrap}
  .score-item{display:flex;align-items:center;gap:0.3rem}
  .score-item .dot{width:8px;height:8px;border-radius:50%}

  /* Source spectrum (inline) */
  .inline-spectrum{position:relative;height:24px;background:linear-gradient(to right,#dbeafe,#f3f4f6,#fee2e2);border-radius:4px;margin:0.75rem 0 0.25rem}
  .inline-spectrum-labels{display:flex;justify-content:space-between;font-size:0.6rem;color:#bbb;font-family:-apple-system,sans-serif}
  .idot{position:absolute;border-radius:50%;background:#1a1a1a;transform:translate(-50%,-50%);top:50%;cursor:default;transition:transform 0.15s}
  .idot:hover{transform:translate(-50%,-50%) scale(1.5);z-index:10}
  .idot .tip{display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:3px;padding:0.2rem 0.5rem;font-size:0.68rem;white-space:nowrap;z-index:20}
  .idot:hover .tip{display:block}

  /* Expand sections */
  .expand-toggle{font-family:-apple-system,sans-serif;font-size:0.78rem;color:#4a6fa5;cursor:pointer;background:none;border:none;padding:0;margin-right:1.25rem}
  .expand-toggle:hover{text-decoration:underline}
  .expand-content{display:none;margin-top:1rem;padding:1rem;background:#f8f8f6;border:1px solid #e8e8e8;border-radius:4px;font-family:-apple-system,sans-serif;font-size:0.82rem}
  .expand-content.open{display:block}

  /* Calibration rounds */
  .cal-round{padding:0.6rem 0;border-bottom:1px solid #eee}
  .cal-round:last-child{border-bottom:none}
  .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.3rem}
  .cal-num{font-weight:700;color:#4a6fa5}
  .cal-pass{font-size:0.72rem;font-weight:600;padding:0.1rem 0.4rem;border-radius:2px}
  .cal-pass.yes{color:#22c55e;background:#f0fdf4}.cal-pass.no{color:#ef4444;background:#fef2f2}
  .cal-scores{font-size:0.75rem;color:#888;margin-bottom:0.25rem}
  .cal-scores span{color:#555}
  .cal-failures{font-size:0.72rem;color:#ef4444;margin-top:0.2rem}
  .cal-rationale{font-size:0.75rem;color:#999;line-height:1.5;margin-top:0.25rem}

  /* Verify panel */
  .verify-row{display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid #eee;font-size:0.78rem}
  .verify-row .vk{color:#888;min-width:130px}.verify-row .vv{color:#333;word-break:break-all;text-align:right;font-family:monospace;font-size:0.72rem}
  .verify-note{margin-top:0.75rem;padding:0.6rem;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:4px;font-size:0.75rem;color:#22c55e}

  /* Attestation */
  .attest{font-family:monospace;font-size:0.7rem;color:#4a6fa5;word-break:break-all;margin-top:0.5rem}

  /* --- SOURCES PAGE --- */
  .section-title{font-size:0.85rem;color:#888;text-transform:uppercase;letter-spacing:0.1em;font-family:-apple-system,sans-serif;margin-bottom:1.5rem;font-weight:400}
  .full-spectrum{position:relative;height:70px;background:linear-gradient(to right,#3b82f6,#9ca3af,#ef4444);border-radius:6px;margin-bottom:0.4rem}
  .full-spectrum-labels{display:flex;justify-content:space-between;font-size:0.72rem;color:#888;font-family:-apple-system,sans-serif;margin-bottom:2.5rem}
  .fdot{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;border:2px solid #1a1a1a;transform:translate(-50%,-50%);top:50%;cursor:default;transition:transform 0.2s}
  .fdot:hover{transform:translate(-50%,-50%) scale(1.4);z-index:10}
  .fdot .tip{display:none;position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;border-radius:4px;padding:0.3rem 0.6rem;font-size:0.75rem;white-space:nowrap;z-index:20}
  .fdot:hover .tip{display:block}
  .source-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}
  .source-card{background:#fff;border:1px solid #e8e8e8;border-radius:6px;padding:1.25rem}
  .source-card h3{font-size:1rem;font-weight:600;font-family:-apple-system,sans-serif;margin-bottom:0.5rem}
  .source-detail{font-size:0.78rem;color:#888;font-family:-apple-system,sans-serif;margin-bottom:0.2rem}
  .slant-badge{display:inline-block;font-size:0.82rem;font-weight:700;font-family:-apple-system,sans-serif;padding:0.1rem 0.5rem;border-radius:3px;margin-top:0.3rem}

  /* --- ACTIVITY PAGE --- */
  .stats-row{display:flex;gap:1.5rem;margin-bottom:2rem;flex-wrap:wrap}
  .stat-card{background:#fff;border:1px solid #e8e8e8;border-radius:6px;padding:1rem 1.5rem;text-align:center;min-width:110px}
  .stat-card .num{font-size:1.6rem;font-weight:700;color:#4a6fa5;font-family:-apple-system,sans-serif}
  .stat-card .lbl{font-size:0.7rem;color:#888;font-family:-apple-system,sans-serif}
  .log-entry{font-size:0.8rem;padding:0.45rem 0;border-bottom:1px solid #f0f0f0;line-height:1.5;font-family:-apple-system,sans-serif}
  .log-entry .time{color:#bbb;font-family:monospace;font-size:0.7rem;margin-right:0.5rem}
  .log-entry .phase{display:inline-block;min-width:80px;font-weight:600;font-size:0.72rem}
  .lp-ingestion{color:#3b82f6}.lp-clustering{color:#8b5cf6}.lp-generation{color:#f59e0b}.lp-evaluation{color:#f97316}.lp-gate{color:#22c55e}.lp-published{color:#10b981}.lp-error{color:#ef4444}.lp-system{color:#9ca3af}
</style>
</head>
<body>

<div class="masthead">
  <h1>The Neutral Wire</h1>
  <div class="tagline">Cryptographically verifiable journalism &middot; Every article auditable on-chain</div>
  <div class="date" id="dateStr"></div>
</div>

<div class="nav-bar">
  <a onclick="showPage('articles')" id="nav-articles" class="active">Latest</a>
  <a onclick="showPage('sources')" id="nav-sources">Sources</a>
  <a onclick="showPage('activity')" id="nav-activity">Pipeline</a>
  <div class="controls">
    <span class="status-dot" id="statusDot"></span>
    <span style="font-size:0.72rem;color:#999" id="statusText"></span>
    <button class="run-btn" onclick="trigger()">Run Now</button>
  </div>
</div>

<div class="banner" id="banner"><span id="bannerText"></span></div>

<!-- ARTICLES -->
<div class="page active" id="page-articles"><div id="articles-list"></div></div>

<!-- SOURCES -->
<div class="page" id="page-sources">
  <div class="section-title">Political Spectrum of Sources</div>
  <div class="full-spectrum" id="globalSpectrum"></div>
  <div class="full-spectrum-labels"><span>Far Left (-1.0)</span><span>Center</span><span>Far Right (+1.0)</span></div>
  <div class="section-title">All Sources</div>
  <div class="source-grid" id="sourceGrid"></div>
</div>

<!-- ACTIVITY -->
<div class="page" id="page-activity">
  <div class="stats-row" id="statsRow"></div>
  <div class="section-title">Pipeline Log</div>
  <div id="logEntries"></div>
</div>

<script>
const SOURCES=[{name:"NPR",slant:-0.35,reliability:"high",type:"rss"},{name:"The Guardian",slant:-0.40,reliability:"high",type:"api"},{name:"Reuters",slant:-0.05,reliability:"very high",type:"rss"},{name:"Associated Press",slant:0.0,reliability:"very high",type:"rss"},{name:"BBC News",slant:-0.10,reliability:"high",type:"rss"},{name:"Wall Street Journal",slant:0.25,reliability:"high",type:"rss"},{name:"The Economist",slant:0.10,reliability:"very high",type:"rss"},{name:"Fox News",slant:0.55,reliability:"medium",type:"rss"}];

document.getElementById('dateStr').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

function showPage(n){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-bar a').forEach(a=>a.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');document.getElementById('nav-'+n).classList.add('active')}

function dots(el,items,cls){el.innerHTML='';items.forEach(s=>{const d=document.createElement('div');d.className=cls;d.style.left=((s.slant+1)/2)*100+'%';const sz=s.size||10;d.style.width=sz+'px';d.style.height=sz+'px';d.innerHTML=`<span class="tip">${esc(s.name)} (${s.slant>=0?'+':''}${s.slant.toFixed(2)})</span>`;el.appendChild(d)})}

function renderSources(){
  dots(document.getElementById('globalSpectrum'),SOURCES.map(s=>({...s,size:14})),'fdot');
  document.getElementById('sourceGrid').innerHTML=SOURCES.map(s=>{
    const c=sColor(s.slant);const dir=s.slant<-0.15?'Left-leaning':s.slant>0.15?'Right-leaning':'Center';
    return`<div class="source-card"><h3>${esc(s.name)}</h3><div class="source-detail">${s.type.toUpperCase()} &middot; ${s.reliability} reliability</div><div class="source-detail">${dir}</div><div class="slant-badge" style="color:${c};background:${c}12;border:1px solid ${c}33">${s.slant>=0?'+':''}${s.slant.toFixed(2)}</div></div>`}).join('')}

function renderArticles(articles){
  const el=document.getElementById('articles-list');
  if(!articles.length){el.innerHTML='<div class="feed-empty"><p style="font-size:1.2rem;font-family:Georgia,serif">No articles yet</p><p style="font-size:0.9rem;color:#aaa;font-family:-apple-system,sans-serif">The pipeline is running. Articles will appear as they pass the publish gate.</p></div>';return}

  el.innerHTML=articles.map((a,i)=>{
    const s=a.slant||{};const sl=s.overall_slant_score;const pass=s.pass_fail;
    const time=a.stored_at?new Date(a.stored_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
    const outlets=new Set((a.sources||[]).map(x=>x.name)).size;
    const hist=a.calibration_history||[];
    const paras=(a.body||'').split('\n\n').filter(Boolean).slice(0,6).map(p=>`<p>${esc(p)}</p>`).join('');

    // Image
    const img=a.image_url
      ?`<img class="card-image" src="${esc(a.image_url)}" alt="" onerror="this.style.display='none'">`
      :'';

    // Score dots
    const scoreDots=[
      {l:'Slant',v:sl,good:sl!=null&&Math.abs(sl)<=0.15},
      {l:'Loaded',v:s.loaded_language_score,good:(s.loaded_language_score||0)<=0.3},
      {l:'Consensus',v:s.consensus_preservation_score,good:(s.consensus_preservation_score||0)>=0.7},
      {l:'Attribution',v:s.attribution_score,good:(s.attribution_score||0)>=0.7},
    ];

    // Calibration history
    const histHtml=hist.length?hist.map(r=>`<div class="cal-round">
      <div class="cal-header"><span class="cal-num">Round ${r.round}</span><span class="cal-pass ${r.pass?'yes':'no'}">${r.pass?'PASS':'FAIL'}</span></div>
      <div class="cal-scores">Slant <span>${fmtS(r.slant)}</span> &middot; Loaded <span>${pct(r.loaded_language)}</span> &middot; Consensus <span>${pct(r.consensus_preservation)}</span> &middot; Attribution <span>${pct(r.attribution)}</span></div>
      ${r.gate_failures&&r.gate_failures.length?`<div class="cal-failures">${r.gate_failures.join('; ')}</div>`:''}
      <div class="cal-rationale">${esc((r.rationale||'').slice(0,200))}${(r.rationale||'').length>200?'...':''}</div>
    </div>`).join(''):'<div style="color:#999;font-size:0.82rem">Passed on first evaluation</div>';

    // Verify panel
    const ah=a.attestation_hash||'';
    const verifyHtml=`<div style="font-family:-apple-system,sans-serif">
      <div class="verify-row"><span class="vk">Content hash</span><span class="vv">${a.content_hash||'N/A'}</span></div>
      <div class="verify-row"><span class="vk">Prompt hash</span><span class="vv">${a.prompt_hash||'N/A'}</span></div>
      <div class="verify-row"><span class="vk">Model</span><span class="vv">${a.model_id||'N/A'}</span></div>
      <div class="verify-row"><span class="vk">Calibration</span><span class="vv">${a.calibration_rounds||0} rounds</span></div>
      <div class="verify-row"><span class="vk">Sources</span><span class="vv">${(a.sources||[]).length} articles, ${outlets} outlets</span></div>
      <div class="verify-row"><span class="vk">Attestation</span><span class="vv">${ah?ah.startsWith('0x')?`<a href="https://sepolia.etherscan.io/tx/${ah}" target="_blank" style="color:#4a6fa5">${ah.slice(0,20)}...</a>`:ah:'dev mode (pending)'}</span></div>
      <div class="verify-note">In production, EigenCompute TEE proves this exact Docker image with this exact neutrality pipeline produced this article.</div>
    </div>`;

    // Attestation link
    const attestHtml=ah.startsWith('0x')
      ?`<a class="attest" href="https://sepolia.etherscan.io/tx/${ah}" target="_blank">${ah}</a>`
      :ah?`<div class="attest">${ah}</div>`:'';

    return`<div class="card">
      ${img}
      <h2>${esc(a.headline)}</h2>
      <div class="card-meta">
        <span>${time}</span><span class="sep">&middot;</span>
        <span>${(a.sources||[]).length} articles from ${outlets} outlets</span><span class="sep">&middot;</span>
        <span>${a.calibration_rounds||0} calibration rounds</span><span class="sep">&middot;</span>
        <span class="${pass?'verified-badge':'verified-badge failed-badge'}">${pass?'Verified Neutral':'Did Not Pass'} ${sl!=null?fmtS(sl):''}</span>
      </div>
      <div class="inline-spectrum" id="isp-${i}"></div>
      <div class="inline-spectrum-labels"><span>Left</span><span>Center</span><span>Right</span></div>
      <div class="card-body">${paras}</div>
      <div class="score-bar">${scoreDots.map(d=>`<span class="score-item"><span class="dot" style="background:${d.good?'#22c55e':'#f59e0b'}"></span>${d.l}: ${d.l==='Slant'?(d.v!=null?fmtS(d.v):'?'):pct(d.v)}</span>`).join('')}</div>
      <div>
        <button class="expand-toggle" onclick="tog('cal-${i}')">Calibration History</button>
        <button class="expand-toggle" onclick="tog('ver-${i}')">Verify Article</button>
      </div>
      <div class="expand-content" id="cal-${i}">${histHtml}</div>
      <div class="expand-content" id="ver-${i}">${verifyHtml}</div>
      ${attestHtml}
    </div>`}).join('');

  articles.forEach((a,i)=>{
    const el=document.getElementById('isp-'+i);
    if(el&&a.sources){
      const counts={};a.sources.forEach(s=>{counts[s.name]=(counts[s.name]||0)+1});
      dots(el,Object.entries(counts).map(([n,c])=>({name:n,slant:a.sources.find(x=>x.name===n).slant,size:Math.min(5+c*2,14)})),'idot');
    }
  });
}

function tog(id){document.getElementById(id).classList.toggle('open')}

function renderActivity(status,events){
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-card"><div class="num">${status.total_articles}</div><div class="lbl">Published</div></div>
    <div class="stat-card"><div class="num">${status.cycles_completed}</div><div class="lbl">Cycles</div></div>
    <div class="stat-card"><div class="num">${status.model||'?'}</div><div class="lbl">Model</div></div>`;
  document.getElementById('logEntries').innerHTML=events.map(e=>`<div class="log-entry"><span class="time">${new Date(e.time).toLocaleTimeString()}</span><span class="phase lp-${e.phase}">${e.phase}</span> ${esc(e.message)}</div>`).join('');
  document.getElementById('statusText').textContent=status.last_run?new Date(status.last_run).toLocaleTimeString():'starting...';
  const b=document.getElementById('banner'),bt=document.getElementById('bannerText');
  if(events.length&&events[0].phase!=='system'){b.classList.add('active');bt.textContent=events[0].message}else{b.classList.remove('active')}
}

function fmtS(v){return(v>=0?'+':'')+v.toFixed(2)}
function pct(v){return v!=null?(v*100).toFixed(0)+'%':'?'}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function sColor(v){const a=Math.abs(v);return a<=0.15?'#22c55e':a<=0.3?'#f59e0b':'#ef4444'}
function badC(v){v=v||0;return v<=0.3?'#22c55e':v<=0.6?'#f59e0b':'#ef4444'}
function goodC(v){v=v||0;return v>=0.7?'#22c55e':v>=0.4?'#f59e0b':'#ef4444'}

async function poll(){try{const[a,s,l]=await Promise.all([fetch('/api/articles').then(r=>r.json()),fetch('/api/pipeline/status').then(r=>r.json()),fetch('/api/pipeline/log?limit=60').then(r=>r.json())]);renderArticles(a);renderActivity(s,l)}catch(e){}}
async function trigger(){await fetch('/api/pipeline/trigger',{method:'POST'})}

renderSources();poll();setInterval(poll,5000);
</script>
</body>
</html>
